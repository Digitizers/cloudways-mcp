name: Release

# Cuts a GitHub Release for the version declared in SKILL.md, with notes taken
# from the matching CHANGELOG.md section.
#
# publish-clawhub.yml does the actual publishing. This workflow dispatches it
# explicitly and waits for it — it does NOT rely on the `release: published`
# event, which GitHub suppresses for releases created with GITHUB_TOKEN (see the
# Publish step). If the publish fails, the release is rolled back, so a release
# existing always means that version reached ClawHub.
#
# Run it after merging a version bump, which is exactly what CI's version-sync
# job tells you to do when main is ahead of the last release.

on:
  workflow_dispatch:

permissions:
  contents: write
  # Needed to dispatch publish-clawhub.yml — see the Publish step for why the
  # release event alone is not enough.
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Cut the release
    runs-on: ubuntu-latest
    env:
      SKILL: .claude/skills/cloudways-mcp/SKILL.md
    steps:
      - uses: actions/checkout@v7

      - name: Refuse to release off a non-default branch
        run: |
          # A release tag must point at a commit on main; tagging a feature branch
          # would publish code that never landed.
          [ "$GITHUB_REF_NAME" = "main" ] || {
            echo "::error::dispatched against '$GITHUB_REF_NAME' — re-run with --ref main"; exit 1; }

      - name: Read version and extract the changelog section
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep -m1 '^version:' "$SKILL" | sed 's/^version:[[:space:]]*//' | tr -d '"' | tr -d "'" | xargs)
          [ -n "$VERSION" ] || { echo "::error::no version in $SKILL"; exit 1; }
          echo "Releasing v$VERSION"

          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" --json tagName >/dev/null 2>&1; then
            echo "::error::v$VERSION is already released — bump the version first"; exit 1
          fi

          python3 - "$VERSION" <<'PY'
          import re, sys, pathlib
          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text()
          # Section runs from its own heading to the next "## " heading (or EOF).
          m = re.search(rf'^## {re.escape(version)} - .*?\n(.*?)(?=\n## |\Z)', text, re.S | re.M)
          if not m or not m.group(1).strip():
              sys.exit(f"::error::no CHANGELOG.md section for {version} — add one before releasing")
          pathlib.Path("release-notes.md").write_text(m.group(1).strip() + "\n")
          print(f"changelog section: {len(m.group(1).strip().splitlines())} lines")
          PY

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          # --target pins the tag to the commit this job checked out and inspected.
          # Without it the tag lands on the default branch's *current* tip, which may
          # already carry a different SKILL.md version than the one being released.
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --notes-file release-notes.md
          echo "Created v$VERSION at $GITHUB_SHA"

      - name: Publish to ClawHub, and wait for it
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          # A release created with GITHUB_TOKEN does NOT emit a `release: published`
          # event that starts another workflow — GitHub suppresses those to prevent
          # recursive runs. workflow_dispatch is the documented exception, so the
          # publish is triggered explicitly instead of relying on the release event.
          # https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
          # If the publish does not succeed, the release must not survive: the CI
          # guard treats "a vX.Y.Z release exists" as proof that ClawHub serves
          # X.Y.Z, and a released-but-unpublished version would turn that guard
          # green over a broken state — while blocking this workflow from being
          # re-run, since it refuses to re-release an existing version.
          rollback() {
            echo "::error::$1 — rolling back the v$VERSION release and its tag, so the CI guard stays red and this workflow can be re-run once the cause is fixed"
            gh release delete "v$VERSION" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag \
              || echo "::error::the rollback itself failed — delete the v$VERSION release manually before retrying"
            exit 1
          }

          # Dispatch against the tag just created, NOT main: main can advance between
          # creating the release and dispatching, and publish-clawhub.yml reads the
          # version out of the tree it runs on — so --ref main could publish a newer
          # version while this job watches it and reports success for $VERSION.
          started=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run publish-clawhub.yml \
            --repo "$GITHUB_REPOSITORY" --ref "v$VERSION" -f dry_run=false \
            || rollback "could not dispatch the ClawHub publish"

          # Identify the run we just started — it must be a dispatch, on this exact
          # tag, created after the timestamp above — so no other run can be mistaken
          # for it and watched in its place.
          run_id=""
          for _ in $(seq 1 12); do
            sleep 5
            run_id=$(gh run list --workflow=publish-clawhub.yml --repo "$GITHUB_REPOSITORY" \
                       -L 10 --json databaseId,createdAt,event,headBranch \
                     | jq -r --arg s "$started" --arg tag "v$VERSION" \
                         '[.[] | select(.event == "workflow_dispatch")
                               | select(.headBranch == $tag)
                               | select(.createdAt >= $s)]
                          | (first.databaseId // empty)')
            [ -n "$run_id" ] && break
          done
          [ -n "$run_id" ] || rollback "dispatched the ClawHub publish but no run appeared"
          echo "publish run: $run_id"

          gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status \
            || rollback "the ClawHub publish failed (run $run_id)"
          echo "ClawHub now serves $VERSION"
