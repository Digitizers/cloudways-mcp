name: Publish to ClawHub

# Publishes the skill payload (.claude/skills/cloudways-mcp/) to ClawHub.
# Dormant until the repo is public and a CLAWHUB_TOKEN repo secret is set.
#
# Triggers:
#   - on a published GitHub Release  → real publish (UI-created releases)
#   - dispatched by release.yml on a version tag → real publish (requires the
#     draft release release.yml just created — see the gate in the Publish step)
#   - manual run (workflow_dispatch) on a branch → dry-run ONLY. A freestanding
#     real publish would put a version on ClawHub with no GitHub release behind
#     it; CI's version-sync guard then points the operator at release.yml, whose
#     re-publish of the same version the registry may refuse — wedging the flow
#     with CI red while ClawHub is actually current. Real publishes therefore go
#     through release.yml (or a UI release), never from here.
#
# THE MARKER ASSET IS THE PROOF OF PUBLICATION. After a successful real publish,
# this workflow uploads `clawhub-published.txt` as an asset on the vX.Y.Z
# release. CI's version-sync guard requires that asset — not mere release
# existence — so any path that creates a release without completing a publish
# (a canceled run, a queued run that never started, a failure) leaves the guard
# red until the publish actually lands. The only other sanctioned writer is
# release.yml's watch step, and only after verifying — from this run's own
# Publish step conclusion — that the publish succeeded.
#
# Note on the release trigger: it only fires for releases created by a human
# (UI / a personal token). A release created by release.yml runs under
# GITHUB_TOKEN, and GitHub suppresses the resulting `release: published` event
# to prevent recursive runs — so release.yml dispatches this workflow explicitly
# rather than depending on the event. Do not "simplify" that away.
#
# The version is read from the skill's SKILL.md front matter (`version:`).

# The run-name embeds the dispatcher's correlation id so release.yml can
# identify ITS run unambiguously — tag + timestamp alone can collide with a
# concurrent manual dry-run on the same tag.
# ' (dry-run)' is appended from the ACTUAL dry_run input, so a run's title is
# unforgeable evidence of its mode — recovery classifiers rely on it to reject
# correlated-but-dry dispatches.
run-name: "Publish to ClawHub${{ inputs.correlation && format(' [{0}]', inputs.correlation) || '' }}${{ inputs.dry_run && ' (dry-run)' || '' }}"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the publish plan without uploading"
        type: boolean
        default: true
      correlation:
        description: "Opaque id from the dispatching workflow (release.yml); shown in the run name"
        type: string
        default: ""
        required: false

permissions:
  # contents: write — the marker-asset upload and the rollback step below.
  # actions: write — re-running the failed main CI guard after a UI publish.
  contents: write
  actions: write

concurrency:
  group: clawhub-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish skill
    runs-on: ubuntu-latest
    env:
      SKILL_DIR: .claude/skills/cloudways-mcp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Install ClawHub CLI
        run: npm i -g clawhub
      - name: Read skill version from SKILL.md
        id: ver
        run: |
          VERSION=$(grep -m1 '^version:' "$SKILL_DIR/SKILL.md" | sed 's/^version:[[:space:]]*//' | tr -d '"' | tr -d "'" | xargs)
          [ -n "$VERSION" ] || { echo "::error::no version in $SKILL_DIR/SKILL.md"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Skill version: $VERSION"
      - name: Authenticate
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          [ -n "$CLAWHUB_TOKEN" ] || { echo "::error::CLAWHUB_TOKEN secret not set"; exit 1; }
          clawhub login --token "$CLAWHUB_TOKEN"
      - name: Publish
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          VERSION: ${{ steps.ver.outputs.version }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
        run: |
          # A real publish from a manual dispatch is only legitimate when release.yml
          # is driving it — and release.yml always (a) creates a DRAFT release for
          # the version, then (b) dispatches this workflow on the tag it just
          # created. So a real tag dispatch must find that draft. A human who
          # hand-creates a bare v* tag and dispatches real has no draft → blocked;
          # a tag whose release is already published is a duplicate → blocked.
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN" != "true" ]; then
            case "$GITHUB_REF" in
              refs/tags/v*) ;;
              *)
                echo "::error::real publishes run through release.yml (gh workflow run release.yml), which dispatches this workflow on the version tag. A freestanding real publish would leave ClawHub ahead of the repo with no release, wedging the release flow on a duplicate-version publish."
                exit 1 ;;
            esac
            if meta=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft 2>&1); then
              if [ "$(jq -r '.isDraft' <<<"$meta")" != "true" ]; then
                echo "::error::$GITHUB_REF_NAME is already a published release — publishing it again would hit the registry's duplicate-version refusal. Nothing to do."
                exit 1
              fi
            else
              echo "::error::no draft release found for $GITHUB_REF_NAME (lookup said: $meta) — real tag publishes are dispatched by release.yml after it creates the draft. Run: gh workflow run release.yml"
              exit 1
            fi
          fi
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — validating the publish without uploading:"
            clawhub skill publish "$SKILL_DIR" --slug cloudways-mcp --name "Cloudways MCP" --version "${{ steps.ver.outputs.version }}" --dry-run
            exit 0
          fi

          # UI releases: the event tag must equal the version this checkout's
          # SKILL.md declares. A mistyped tag would publish $VERSION to the
          # registry while the marker lands on the unrelated tag's release —
          # the guard hunts v$VERSION forever and a corrected release then hits
          # the duplicate refusal. Refuse before touching the registry; the
          # mistyped release is preserved (no verified_failure) for a human to
          # delete.
          if [ "$GITHUB_EVENT_NAME" = "release" ] && [ "$RELEASE_TAG" != "v$VERSION" ]; then
            echo "::error::release tag '$RELEASE_TAG' does not match the checked-out SKILL.md version v$VERSION — refusing to publish. Delete the mistyped release and cut one whose tag matches."
            exit 1
          fi

          # Re-run awareness: a PRIOR attempt may already have committed the
          # version (published, then died on the marker). Scan ALL prior
          # attempts, not just the previous one — AMBIGUITY IS STICKY: an
          # attempt-1 cancellation stays ambiguous forever, and a later
          # attempt's guard-refusal records a step 'failure' that must never be
          # read as proof the version was not committed.
          if [ "${GITHUB_RUN_ATTEMPT:-1}" -gt 1 ]; then
            ambiguous=""
            a=1
            while [ "$a" -lt "$GITHUB_RUN_ATTEMPT" ]; do
              if ! prev=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/attempts/$a/jobs" 2>&1); then
                echo "::error::attempt $GITHUB_RUN_ATTEMPT cannot query attempt $a ($prev) — refusing to publish blind; an earlier attempt may already have committed $VERSION. Verify the registry manually, then re-run."
                exit 1
              fi
              po=$(jq -r '[.jobs[].steps[]? | select(.name == "Publish")] | (first.conclusion // "unknown")' <<<"$prev")
              if [ "$po" = "success" ]; then
                echo "attempt $a already published — skipping the duplicate publish; the marker step will attach"
                exit 0
              fi
              [ "$po" = "failure" ] || ambiguous="$a:$po"
              a=$((a + 1))
            done
            if [ -n "$ambiguous" ]; then
              echo "::error::attempt ${ambiguous%%:*} ended '${ambiguous#*:}' — ambiguous, it may have committed $VERSION, and no later attempt can launder that away. Refusing to re-publish. Verify the registry: if $VERSION is there, attach the marker (gh release upload <tag> clawhub-published.txt --clobber); if not, delete or draft the release and redo via release.yml."
              exit 1
            fi
            echo "every prior attempt's publish verifiably failed — safe to retry"
          fi

          # verified_failure is the ONLY evidence the rollback below accepts: it
          # means THIS attempt ran the publish command and the command itself
          # failed, with no prior successful attempt. Ambiguity paths above exit
          # without setting it, so they can never trigger a deletion.
          clawhub skill publish "$SKILL_DIR" --slug cloudways-mcp --name "Cloudways MCP" --version "${{ steps.ver.outputs.version }}" || {
            echo "verified_failure=true" >> "$GITHUB_OUTPUT"
            exit 1
          }

      # THE step that turns CI green: the marker asset is the durable proof that
      # this version actually reached ClawHub. It is written here and nowhere
      # else, only after the publish command above succeeded.
      #
      # Exhausted marker attempts FAIL the run. This is safe — and load-bearing —
      # since both rollback paths became evidence-gated: this workflow's rollback
      # checks steps.publish.outcome, and release.yml's watch interrogates the
      # Publish step conclusion before deciding. A nonzero run here therefore
      # cannot delete the release; what it DOES do is push the release.yml parent
      # into its recovery path, which verifies the publish succeeded and attaches
      # the marker itself. (Exiting 0, as an earlier revision did, made the parent
      # flip a marker-less draft into a published release the guard rejects and
      # release.yml refuses to touch again.)
      - name: Upload the publish-completion marker
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
        run: |
          printf 'cloudways-mcp %s published to ClawHub by run %s (%s)\n' \
            "$VERSION" "$GITHUB_RUN_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > clawhub-published.txt
          # --clobber: a re-run of this workflow must refresh, not trip over, an
          # existing marker.
          for attempt in 1 2 3; do
            if gh release upload "$TAG" clawhub-published.txt --repo "$GITHUB_REPOSITORY" --clobber; then
              echo "marker attached to $TAG"; exit 0
            fi
            echo "marker upload attempt $attempt failed"; sleep 10
          done
          echo "::error::ClawHub serves $VERSION but the marker upload failed after 3 attempts. The release is intentionally left standing (rollbacks are gated on the publish outcome); a release.yml parent will verify and attach the marker itself, or re-attach by hand: gh release upload $TAG clawhub-published.txt --clobber"
          exit 1

      # Mirror of release.yml's rerun step, for the UI entry point: the failed
      # version-sync run on main has no event to revive it (ci.yml hears only
      # push/pull_request), so after a successful UI-triggered publish main would
      # stay red until an unrelated push. Warn-only on any hiccup — the publish
      # is already complete. Fail-closed listing per the round-10 rule.
      - name: Re-run the failed CI guard on main (UI path)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! runs_json=$(gh run list --workflow=ci.yml --repo "$GITHUB_REPOSITORY" --branch main \
                             -L 10 --json databaseId,conclusion); then
            echo "::warning::could not list ci.yml runs — if main's guard is red, re-run it manually (gh run rerun <id> --failed)"
            exit 0
          fi
          # All recent failures, not just the newest: main may have advanced past
          # the bump commit while this publish ran, leaving more than one commit
          # red on the same missing-release cause. Re-running a still-broken one
          # just turns red again — harmless.
          ids=$(jq -r '.[] | select(.conclusion == "failure") | .databaseId' <<<"$runs_json")
          [ -n "$ids" ] || { echo "no failed ci.yml run on main — nothing to re-run"; exit 0; }
          for run_id in $ids; do
            gh run rerun "$run_id" --repo "$GITHUB_REPOSITORY" --failed \
              && echo "re-ran CI run $run_id" \
              || echo "::warning::could not re-run CI run $run_id — re-run it manually so main reflects the synced state"
          done

      # Defense-in-depth for the UI entry point: the guard no longer NEEDS this
      # (no marker = red regardless), but leaving a published-yet-unpublished
      # release standing would still mislead humans browsing the releases page,
      # and would block release.yml's re-run on 'already released'.
      # cancelled() as well as failure(): a canceled run is not success(), and a
      # UI release whose publish was canceled mid-way is exactly as unpublished as
      # one whose publish failed.
      # Rollback ONLY on verified_failure — an output the Publish step writes
      # exclusively when the publish command itself failed on this attempt with
      # no prior successful attempt. Everything else is ambiguous and preserves
      # the release: 'cancelled' may land after the registry committed; a step
      # 'failure' on a re-run may be the duplicate refusal of a version the
      # FIRST attempt already committed; the ambiguity exits above set no
      # output. Recovery for preserved states: the guard stays red (no marker) —
      # if the registry has the version, attach the marker by hand; if not, flip
      # the release to draft (gh release edit <tag> --draft=true) and run
      # release.yml, whose pre-flight sweeps the marker-less draft and redoes.
      - name: Roll back the release if a release-triggered publish failed
        if: (failure() || cancelled()) && github.event_name == 'release' && steps.publish.outputs.verified_failure == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "::error::the ClawHub publish failed for $TAG — deleting that release and its tag so the flow can be retried cleanly; fix the cause, then re-release"
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag \
            || echo "::error::the rollback itself failed — delete the $TAG release manually"
