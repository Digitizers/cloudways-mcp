name: Publish to ClawHub

# Publishes the skill payload (.claude/skills/cloudways-mcp/) to ClawHub.
# Dormant until the repo is public and a CLAWHUB_TOKEN repo secret is set.
#
# Triggers:
#   - on a published GitHub Release  → real publish
#   - manual run (workflow_dispatch) → choose dry-run or real publish
#
# Note on the release trigger: it only fires for releases created by a human
# (UI / a personal token). A release created by release.yml runs under
# GITHUB_TOKEN, and GitHub suppresses the resulting `release: published` event
# to prevent recursive runs — so release.yml dispatches this workflow explicitly
# rather than depending on the event. Do not "simplify" that away.
#
# The version is read from the skill's SKILL.md front matter (`version:`).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the publish plan without uploading"
        type: boolean
        default: true

permissions:
  # write is needed only by the rollback step below, which deletes a release whose
  # publish failed.
  contents: write

concurrency:
  group: clawhub-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish skill
    runs-on: ubuntu-latest
    env:
      SKILL_DIR: .claude/skills/cloudways-mcp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Install ClawHub CLI
        run: npm i -g clawhub
      - name: Read skill version from SKILL.md
        id: ver
        run: |
          VERSION=$(grep -m1 '^version:' "$SKILL_DIR/SKILL.md" | sed 's/^version:[[:space:]]*//' | tr -d '"' | tr -d "'" | xargs)
          [ -n "$VERSION" ] || { echo "::error::no version in $SKILL_DIR/SKILL.md"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Skill version: $VERSION"
      - name: Authenticate
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          [ -n "$CLAWHUB_TOKEN" ] || { echo "::error::CLAWHUB_TOKEN secret not set"; exit 1; }
          clawhub login --token "$CLAWHUB_TOKEN"
      - name: Publish
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — validating the publish without uploading:"
            clawhub skill publish "$SKILL_DIR" --slug cloudways-mcp --name "Cloudways MCP" --version "${{ steps.ver.outputs.version }}" --dry-run
            exit 0
          fi
          clawhub skill publish "$SKILL_DIR" --slug cloudways-mcp --name "Cloudways MCP" --version "${{ steps.ver.outputs.version }}"

      # release.yml rolls back the releases it creates. This covers the other entry
      # point — a release created by hand in the UI — so the invariant holds for
      # both: a vX.Y.Z release exists only if X.Y.Z actually reached ClawHub. Without
      # this, a failed publish on the UI path leaves the release standing and CI's
      # version-sync guard goes green over a ClawHub that is still a version behind.
      - name: Roll back the release if a release-triggered publish failed
        if: failure() && github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "::error::the ClawHub publish failed for $TAG — deleting that release and its tag so CI stays red; fix the cause, then re-release"
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag \
            || echo "::error::the rollback itself failed — delete the $TAG release manually"
