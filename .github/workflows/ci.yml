name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  skill:
    runs-on: ubuntu-latest
    env:
      SKILL: .claude/skills/cloudways-mcp/SKILL.md
    steps:
      - uses: actions/checkout@v7

      - name: SKILL frontmatter lint
        run: |
          python3 - <<'PY'
          import re, pathlib, os
          p = pathlib.Path(os.environ["SKILL"]).read_text()
          m = re.match(r'^---\n(.*?)\n---\n', p, re.S)
          assert m, "missing frontmatter"
          fm = m.group(1)
          for k in ("name", "description", "version"):
              mm = re.search(rf'^{k}:\s*(.+)$', fm, re.M)
              assert mm and mm.group(1).strip(), f"frontmatter missing non-empty {k}"
          print("frontmatter OK")
          PY

      - name: Reference links exist
        run: |
          python3 - <<'PY'
          import re, pathlib, os
          skill = pathlib.Path(os.environ["SKILL"])
          base = skill.parent
          refs = re.findall(r'references/[A-Za-z0-9_-]+\.md', skill.read_text())
          missing = [r for r in set(refs) if not (base / r).exists()]
          assert not missing, f"missing referenced files: {missing}"
          print(f"references OK ({len(set(refs))} linked)")
          PY

      - name: No-leak guard
        run: |
          set -euo pipefail
          # The shipped skill payload (.claude/) must stay studio-neutral and
          # generic — no studio framing or personal names inside the skill itself.
          # "digitizer-skills" (public marketplace) and the "Digitizers/" org prefix are
          # allowed. Strip those exact tokens, then re-scan the residue — so a line like
          # "Digitizers/digitizer-os" still fails on its remaining "digitizer-os" part,
          # unlike a line-level grep -v exemption which would wave the whole line through.
          if grep -rniE "digitizer|דיגיטייזר|Ben/Avi" .claude/ | perl -pe 's/(?<![A-Za-z0-9-])digitizer-skills(?![A-Za-z0-9-])//g; s/(?<![A-Za-z0-9-])Digitizers\///g' | grep -iE "digitizer|דיגיטייזר|Ben/Avi"; then
            echo "::error::studio framing / personal names found in the skill payload — keep .claude/ generic"; exit 1
          fi
          # The repo-level README may carry the studio brand footer (Digitizer),
          # but must never expose personal names.
          if grep -rniE "Ben/Avi|benkalsky" README.md; then
            echo "::error::personal name found in README — use the studio brand, not personal names"; exit 1
          fi
          # Secret-shaped strings must never appear in the payload — nor in the
          # tracked MCP configs, which are placeholder-only by policy. Strip the
          # "path:line:" grep prefix before the exemption filter: otherwise the
          # ".mcp.json.example" filename matches the "example" exemption and waves
          # real tokens in that file through.
          if grep -rniE "(api[_-]?key|bearer|secret|password|access[_-]?token)[\"'[:space:]=:]+[A-Za-z0-9/_-]{24,}" .claude/ .mcp.json .mcp.json.example \
             | sed 's/^[^:]*:[0-9]*://' \
             | grep -viE "your-|YOUR_|CLIENT_[AB]|example|<|\$\{|placeholder"; then
            echo "::error::possible real secret found"; exit 1
          fi
          # The line-based grep can be evaded by valid JSON that splits key and
          # value across lines, and its charset misses base64-style tokens with
          # . + =. Parse the tracked MCP configs and check the actual env/header
          # VALUES, independent of layout: each must be an env placeholder or too
          # short to be a live credential.
          python3 - <<'PY'
          import json, re, sys
          PLACEHOLDER = re.compile(r'\$\{[A-Za-z_][A-Za-z0-9_]*(:-([^}]*))?\}')
          def secret_shaped(val):
              # A live credential can hide INSIDE a placeholder default
              # (${VAR:-<secret>}) or outside placeholders entirely — check both:
              # every :- default and the literal residue must stay below
              # credential size.
              for m in PLACEHOLDER.finditer(val):
                  if len(m.group(2) or '') >= 24:
                      return True
              return len(PLACEHOLDER.sub('', val)) >= 24
          bad = []
          for path in ('.mcp.json', '.mcp.json.example'):
              cfg = json.load(open(path))
              for name, srv in cfg.get('mcpServers', {}).items():
                  for section in ('env', 'headers'):
                      for key, val in srv.get(section, {}).items():
                          if isinstance(val, str) and secret_shaped(val):
                              bad.append(f'{path}: {name}.{section}.{key}')
          if bad:
              print('::error::secret-shaped value in tracked MCP config (placeholder-only policy):')
              [print('  ' + b) for b in bad]
              sys.exit(1)
          print('mcp placeholder-value guard passed')
          PY
          echo "no-leak guard passed"
